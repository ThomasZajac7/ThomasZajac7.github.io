//Initializes Gloabal Variables
let rand = Math.floor(Math.random() * vocab.length);
let greekSide = 0
let upSide = 0

//vars for selecting the start and end of range
let rangeStart = 3
let rangeEnd = 15

//Array for holding the active material
const practiceSet = []

//
initializePracticeSet()

//Initializes the card and debug
document.getElementById("card").innerHTML = practiceSet[rand][0]
document.getElementById("debug").innerHTML = "Remaining: " + practiceSet.length;

function initializePracticeSet() {
	//Initializes practiceSet array to hold all the material
	
	//resets it
	practiceSet.splice(0, practiceSet.length)

	//Adds all the selected material in range
	for (let i = 0; i < vocab.length; i++) {
		if (Number(vocab[i][2]) >= rangeStart && Number(vocab[i][2]) <= rangeEnd) {
			practiceSet.push(vocab[i])
		}
	}
}



function flip() {
	
	rand = Math.floor(Math.random() * practiceSet.length);
	
	//Sets the side thats face up dependent upon if one is working on Greek or English
	if (upSide == 0) { greekSide = 0; }
	else { greekSide = 1; }

	document.getElementById("card").innerHTML = practiceSet[rand][greekSide]
	
}

function correctCard() {
	
	practiceSet.splice(rand, 1);
	
	//presents the next card!
	flip()
	
	document.getElementById("debug").innerHTML = "Remaining: " + practiceSet.length;
}

function wrongCard() {

	//presents the next card!
	flip()
}

function flipCard() {

	//Flips to the definition!
	if (greekSide == 0) {

		greekSide = 1
		if (upSide == 0) { 
			document.getElementById("card").innerHTML = practiceSet[rand][1] + practiceSet[rand][3]; 
		}
		else { 
			document.getElementById("card").innerHTML = practiceSet[rand][1]; 
		}
	}
	else {
		document.getElementById("card").innerHTML = practiceSet[rand][0];
		greekSide = 0
		if (upSide == 0) { 
			document.getElementById("card").innerHTML = practiceSet[rand][0]; 
		}
		else { 
			document.getElementById("card").innerHTML = practiceSet[rand][0] + practiceSet[rand][3]; 
		}
	}
}

function submitRange() {

	//Submits the range!
	rangeStart = document.getElementById("startRange").valueAsNumber;
	rangeEnd = document.getElementById("endRange").valueAsNumber;
	document.getElementById("range").innerHTML = "Vocabulary from chapters " + rangeStart + " through " + rangeEnd;
	initializePracticeSet();
	
	//sets the remaining to acurately reflect the new set
	document.getElementById("debug").innerHTML = "Remaining: " + practiceSet.length;

	//Flips the starting card according to the practiceSet to be correct
	flip();
}

function swapGE() {
	if (upSide == 0) { upSide = 1;}
	else { upSide = 0; }
	flipCard();
}
