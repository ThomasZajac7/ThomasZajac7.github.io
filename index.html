function flip() {
	
	rand = Math.floor(Math.random() * vocab.length);
	document.getElementById("card").innerHTML = vocab[rand][0]
	greekSide = 0
	
}

function correctCard() {
	
	vocab.splice(rand, 1);
	
	//presents the next card!
	flip()
	
	document.getElementById("debug").innerHTML = "Remaining: " + vocab.length;
}

function wrongCard() {

	//presents the next card!
	flip()
}

function flipCard() {

	//Flips to the definition!
	if (greekSide == 0) {
		document.getElementById("card").innerHTML = vocab[rand][1];
		greekSide = 1
	}
	else {
		document.getElementById("card").innerHTML = vocab[rand][0];
		greekSide = 0
	}
}
