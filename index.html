 (graph ics)', '4'], ['διαθήκη, ἡ ', 'covenant', '4'], ['διδαχή, ἡ ', 'teaching (the Didache [an early Christian writing])', '4'], ['δικαιοσύνη, ἡ ', 'righteousness', '4'], ['εἰρήνη, ἡ ', 'peace (Irene )', '4'], ['ἐντολή, ἡ ', 'commandment', '4'], ['ἐπιστολή, ἡ ', 'letter (epistle )', '4'], ['ζωή, ἡ ', 'life (zo ology)', '4'], ['κεφαλή, ἡ ', 'head (encephalitis [inflamation of the brain])', '4'], ['ὀργή, ἡ ', 'anger, wrath', '4'], ['παραβολή, ἡ ', 'parable (parabo lic)', '4'], ['περιτομή, ἡ ', 'circumcision', '4'], ['προσευχή, ἡ ', 'prayer', '4'], ['συναγωγή, ἡ ', 'synagogue', '4'], ['ὑπομονή, ἡ ', 'endurance, steadfastness', '4'], ['φωνή, ἡ ', 'voice, sound (phon ology)', '4'], ['ψυχή, ἡ ', 'soul, life (psych ology)', '4'], ['μαθητής, ὁ ', 'disciple (√μαθ, math ematics)', '4'], ['προφήτης, ὁ ', 'prophet (prophetic)', '4'], ['στρατιώτης, ὁ ', 'soldier (strat egic)', '4'], ['τελώνης, ὁ ', 'tax collector', '4'], ['ὑποκριτής, ὁ ', 'hypocrite (hypocritical)', '4'], ['Μεσσίας, ὁ ', 'Messiah (messi anic)', '4'], ['νεανίας, ὁ ', 'young man (from νεός ["new"], neo -orthodox)', '4'], ['ὁ, ἡ, τό ', 'the', '4'], ['ἀπό ', 'from; away from, of (with gen.)', '4'], ['εἰς ', 'into; to, for, in (with acc.) (es oteric)', '4'], ['ἐκ ', 'out of; from, by (with gen.) (ec centric)', '4'], ['ἐν ', 'in; within, by, with, among (with dat.) (en ergy)', '4'], ['ἀγαθός, -ή, -όν ', 'good (Agath a)', '6'], ['ἀγαπητός, -ή, -όν ', 'beloved (the Agape [the love feast])', '6'], ['ἄλλος, -η, -ο ', 'other (neuter nom./acc. is irregular)', '6'], ['δυνατός, -ή, -όν ', 'powerful, possible (dyna mic)', '6'], ['ἕκαστος, -η, -ον ', 'each, every', '6'], ['ἔσχατος, -η, -ον ', 'last (eschat ology [the study of last things])', '6'], ['καινός, -ή, -όν ', 'new', '6'], ['κακός, -ή, -όν ', 'bad (cac ophony [a bad sound])', '6'], ['καλός, -ή, -όν ', 'good, beautiful (calligraphy [beautiful writing])', '6'], ['μόνος, -η, -ον ', 'only (mon otheism)', '6'], ['πιστός, -ή, -όν ', 'faithful (√πιθ [see πείθω, §26])', '6'], ['πρῶτος, -η, -ον ', 'first (prot otype)', '6'], ['σοφός, -ή, -όν ', 'wise (soph isticated)', '6'], ['τρίτος, -η, -ον ', 'third', '6'], ['ἅγιος, -α, -ον ', 'holy, saint (hagi ography [a writing about a saint])', '6'], ['ἄξιος, -α, -ον ', 'worthy (axi om [a worthy statement])', '6'], ['δεύτερος, -α, -ον ', 'second (Deuter onomy [the second statement of the law])', '6'], ['δίκαιος, -α, -ον ', 'righteous, just (√δικ ["to point out"], dic tate)', '6'], ['ἕτερος, -α, -ον ', 'other, different (heter osexual)', '6'], ['ἰσχυρός, -ά, -όν ', 'strong', '6'], ['μακάριος, -α, -ον ', 'blessed (macarism [a word of blessing])', '6'], ['μικρός, -ά, -όν ', 'small, little (micr oscope)', '6'], ['νεκρός, -ά, -όν ', 'dead (necr omancy [conversation with the dead])', '6'], ['νεός, -ά, -όν ', 'new (ne onatal)', '6'], ['πονηρός, -ά, -όν ', 'evil', '6'], ['ἀδύνατος, -ον ', 'impossible (dyn amic)', '6'], ['αἰώνιος, -ον ', 'eternal (aeon )', '6'], ['ἀκάθαρτος, -ον ', 'unclean (catharsis)', '6'], ['ἄπιστος, -ον ', 'unbelieving, faithless (cf. πιστεύω)', '6']];

let rand = Math.floor(Math.random() * vocab.length);
let greekSide = 1


//Initializes the card
document.getElementById("card").innerHTML = vocab[rand][0]

function flip() {
	
	rand = Math.floor(Math.random() * vocab.length);
	document.getElementById("card").innerHTML = vocab[rand][0]
	
}

function correctCard() {
	
	vocab.splice(rand, 1);
	
	//presents the next card!
	flip()
	
	//document.getElementById("debug").innerHTML = vocab.length + " " + rand
}

function wrongCard() {

	//presents the next card!
	flip()
}

function flipCard() {

	//Flips to the definition!
	if (greekSide == 0) {
		document.getElementById("card").innerHTML = vocab[rand][1];
		greekSide = 1
	}
	else {
		document.getElementById("card").innerHTML = vocab[rand][0];
		greekSide = 0
	}
}

</script>

<button class="correctBtn" onclick="correctCard()" id="cCard">Correct!</button>
<button class="flipBtn" onclick="flipCard()" id="fCard">Flip!</button>
<button class="wrongBtn" onclick="wrongCard()" id="wCard">Wrong!</button>
